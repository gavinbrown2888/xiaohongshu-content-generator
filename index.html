<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书内容生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 16px 10px 30px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 18px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  }

  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: #999;
    font-size: 13px;
    margin-bottom: 20px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  input {
    flex: 1;
    min-width: 0;
    padding: 13px 14px;
    border: 2px solid #eee;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input:focus { border-color: #ff6b6b; }

  .btn-primary {
    padding: 13px 18px;
    background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,107,0.4); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    background: #f8f8f8;
    border-radius: 10px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    padding: 11px 0;
    text-align: center;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    color: #999;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab.active {
    background: #fff;
    color: #ff6b6b;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .result-area { min-height: 200px; }

  .result-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 14px 14px;
    background: #fdf2f8;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  .result-item:nth-child(1) { animation-delay: 0.05s; }
  .result-item:nth-child(2) { animation-delay: 0.15s; }
  .result-item:nth-child(3) { animation-delay: 0.25s; }
  .result-item:nth-child(4) { animation-delay: 0.35s; }
  .result-item:nth-child(5) { animation-delay: 0.45s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .copy-btn {
    margin-left: auto;
    padding: 8px 14px;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .copy-btn:active { background: #ff6b6b; color: #fff; border-color: #ff6b6b; }

  .empty-tip {
    text-align: center;
    color: #ccc;
    padding: 40px 0;
    font-size: 14px;
  }

  /* Copywriting cards */
  .copywriting-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .copywriting-card {
    background: #fdf2f8;
    border-radius: 14px;
    padding: 18px 16px;
    animation: fadeIn 0.35s ease forwards;
    opacity: 0;
  }

  .copywriting-card:nth-child(1) { animation-delay: 0.05s; }
  .copywriting-card:nth-child(2) { animation-delay: 0.15s; }
  .copywriting-card:nth-child(3) { animation-delay: 0.25s; }

  .copywriting-card .card-header {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .copywriting-card .style-tag {
    padding: 4px 10px;
    background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    color: #fff;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .copywriting-card .hook-type {
    padding: 4px 10px;
    background: #fff0e6;
    color: #e67e22;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .copywriting-card .card-copy-btn {
    margin-left: auto;
    padding: 8px 14px;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .copywriting-card .card-copy-btn:active { background: #ff6b6b; color: #fff; border-color: #ff6b6b; }

  .copywriting-card .card-step {
    margin-bottom: 10px;
  }

  .copywriting-card .step-label {
    font-size: 11px;
    font-weight: 700;
    color: #ff6b6b;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .copywriting-card .step-text {
    font-size: 15px;
    color: #555;
    line-height: 1.85;
  }

  .copywriting-card .card-tags {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed #f0c4d8;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .copywriting-card .hash-tag {
    font-size: 12px;
    color: #ff6b6b;
    background: #fff;
    padding: 4px 10px;
    border-radius: 12px;
    line-height: 1.4;
  }

  .copywriting-card .interact-hint {
    margin-top: 10px;
    font-size: 13px;
    color: #999;
    font-style: italic;
  }

  /* ---- 标签组合器 ---- */
  .tag-area { animation: fadeIn 0.35s ease forwards; }

  .tag-section { margin-bottom: 18px; }

  .tag-section .section-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tag-section .section-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tag-section .section-count {
    font-weight: 400;
    color: #999;
    font-size: 12px;
  }

  .tag-section .tag-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    background: #fff;
    border: 2px solid #eee;
    border-radius: 22px;
    font-size: 14px;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .tag-chip:active { transform: scale(0.96); }

  .tag-chip.selected {
    background: #fdf2f8;
    border-color: #ff6b6b;
    color: #ff6b6b;
    font-weight: 600;
  }

  .tag-chip .chip-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .tag-chip.selected .chip-check {
    background: #ff6b6b;
    border-color: #ff6b6b;
    color: #fff;
  }

  .tag-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn-secondary {
    padding: 12px 18px;
    background: #fff;
    border: 2px solid #eee;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-secondary:active { background: #f8f8f8; border-color: #ccc; }

  .btn-copy-tags {
    padding: 12px 18px;
    background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-copy-tags:active { transform: scale(0.97); }
  .btn-copy-tags:disabled { opacity: 0.5; }

  .copy-feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0,0,0,0.78);
    color: #fff;
    padding: 12px 28px;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s;
    z-index: 99;
  }

  .copy-feedback.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .tag-summary {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .tag-summary-item {
    padding: 4px 10px;
    background: #f8f8f8;
    border-radius: 14px;
    font-size: 12px;
    color: #999;
  }

  /* ---- 手机端（宽度 ≤ 400px）进一步优化 ---- */
  @media (max-width: 400px) {
    body {
      padding: 8px 4px 24px;
    }

    .card {
      border-radius: 12px;
      padding: 18px 12px;
    }

    h1 { font-size: 20px; }

    .input-row {
      flex-direction: column;
      gap: 8px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      text-align: center;
    }

    .tabs { border-radius: 8px; }

    .tab {
      font-size: 13px;
      padding: 10px 0;
    }

    .result-item {
      font-size: 14px;
      padding: 12px;
      gap: 6px;
    }

    .copywriting-card {
      padding: 14px 12px;
    }

    .copywriting-card .card-header {
      gap: 6px;
    }

    .copywriting-card .step-text {
      font-size: 14px;
      line-height: 1.8;
    }

    .tag-chip {
      font-size: 13px;
      padding: 8px 12px;
    }

    .tag-actions { flex-direction: column; }

    .tag-actions button { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="card">
  <h1>小红书内容生成器</h1>
  <p class="subtitle">基于爆款笔记拆解 · 输入产品一键生成标题和文案</p>

  <div class="input-row">
    <input type="text" id="productInput" placeholder="输入产品名称，如：墨镜、防晒霜、咖啡机..." autofocus>
    <button class="btn-primary" id="generateBtn" onclick="generate()">生成内容</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="title" onclick="switchTab('title')">标题</button>
    <button class="tab" data-tab="copywriting" onclick="switchTab('copywriting')">文案</button>
    <button class="tab" data-tab="tags" onclick="switchTab('tags')">标签</button>
    <button class="tab" data-tab="all" onclick="switchTab('all')">全部</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="empty-tip" id="emptyTip">输入产品名称后点击「生成内容」</div>
    <ul class="result-list" id="titleList" style="display:none"></ul>
    <div class="copywriting-list" id="copywritingList" style="display:none"></div>
    <div class="tag-area" id="tagArea" style="display:none"></div>
  </div>
</div>

<div class="copy-feedback" id="copyFeedback">已复制到剪贴板</div>

<script>
let currentTab = 'title';
let lastProduct = '';
let lastTitles = [];
let lastCopywritings = [];
let lastTags = null; // { traffic: [], precise: [], scene: [], longtail: [] }

// ============================================================
// 爆款标题模板 —— 7种钩子句式，来自真实爆款笔记拆解
// ============================================================
const titleTemplates = [
  // 1. 脸型痛点流（流量最高）：脸型+痛点+效果，直接喊脸型制造强共鸣
  { hook: '脸型痛点', t: p => `方圆脸本命${p}！！巨遮颧骨大脸女生闭眼入` },
  { hook: '脸型痛点', t: p => `圆脸短下巴都去给我试这个${p}！！修饰脸型一绝` },
  { hook: '脸型痛点', t: p => `${p}也太适合长脸了吧！！今年最爱的${p}没有之一` },
  { hook: '脸型痛点', t: p => `阔面方圆脸天菜${p}✨颧骨下颌线直接隐形` },
  { hook: '脸型痛点', t: p => `大脸救星来了💡这个${p}戴上秒变小脸既视感` },
  // 2. 明星同款蹭流（流量天花板）：绑定明星/IP自带话题热度
  { hook: '明星同款', t: p => `XX同款${p}帮你们试了！！这质感谁懂啊🔥` },
  { hook: '明星同款', t: p => `终于扒到XX戴的这款${p}！！明星同款也太香了` },
  { hook: '明星同款', t: p => `XX私服${p}合集✨明星出街都焊在脸上的款式` },
  // 3. 门店试戴真实感（高互动）：门店真实体验摆脱广告嫌疑
  { hook: '门店试戴', t: p => `门店试戴XX同款${p}✨被陌生人一句话种草了` },
  { hook: '门店试戴', t: p => `SA说这款${p}是断货王大爆款！！刚好有货赶紧拿下` },
  // 4. 断货稀缺感（高转化）：营造抢手氛围激发从众心理
  { hook: '断货稀缺', t: p => `这款${p}也太难买了吧😭蹲了好久终于抢到了` },
  { hook: '断货稀缺', t: p => `店员说每天都有人来问这款${p}！！断货王实至名归` },
  // 5. 场景氛围感（高传播）：绑定场景+穿搭让用户一眼代入
  { hook: '场景氛围', t: p => `戴上${p}是感受阳光的第一步💜氛围感直接拉满` },
  { hook: '场景氛围', t: p => `夏日拍照📸有了这个${p}随手一拍都嘎嘎出片` },
  { hook: '场景氛围', t: p => `摘下${p}闺蜜说还是戴上吧😂出街必备时髦单品` },
  // 6. 平价平替流：价格/定位+大牌对标，突出性价比
  { hook: '平价平替', t: p => `百元拿下${p}✨质感不输大牌！！性价比直接拉满` },
  { hook: '平价平替', t: p => `不是大牌买不起，是这个${p}更有性价比🏆` },
  { hook: '平价平替', t: p => `学生党闭眼冲🎉这个平价${p}也太能打了吧` },
  // 7. 情绪口语化种草（高互动）：闺蜜分享风+情绪词感染力
  { hook: '情绪种草', t: p => `谁懂啊！！这个${p}真的巨巨巨巨好用😭` },
  { hook: '情绪种草', t: p => `${p}到噜！！素颜出门直接拿捏✨焊在脸上了` },
  { hook: '情绪种草', t: p => `救命🆘这个${p}戴一次就回不去了！！本命单品` },
  // 8. 无广真实测评（高信任）：主打真实自用消除广告感
  { hook: '真实测评', t: p => `无广！纯自用${p}分享💬用一个月的真实感受` },
  { hook: '真实测评', t: p => `攒了好久的${p}合集📦分享人见人问的几款` },
  { hook: '真实测评', t: p => `贵价到平价${p}测评🔍哪款最适合？看完就懂` },
  // 9. 复古小众风格（高收藏）：满足个性需求自带话题度
  { hook: '复古小众', t: p => `这副复古${p}也太懂氛围感了吧！！自带港风滤镜` },
  { hook: '复古小众', t: p => `小众不撞款✨这个${p}戴上就是高冷女明星` },
  // 10. 品牌干货盘点（高收藏+高转发）：帮用户解决选购难题
  { hook: '干货盘点', t: p => `${p}热门款大盘点🔥为什么全网人手一副？看完就懂` },
  { hook: '干货盘点', t: p => `${p}怎么选❓看这3点就够了！！新手避雷指南` },
  { hook: '干货盘点', t: p => `买${p}前必看❗我踩过的坑你别再踩💣` },
];

// ============================================================
// 爆款文案模板 —— 4步种草公式 + emoji分区短句排版
// 公式：共情开头 → emoji分区拆解(✨版型😎上脸🌞功能💆佩戴💫场景) → 真实感受+小缺点 → 话题标签+互动引导
// ============================================================
const copywritingTemplates = [
  // ---- 模板1：脸型痛点+素颜神器（流量最大） ----
  {
    style: '脸型种草',
    hookType: '直接喊脸型 + emoji分区排版',
    generate(p) {
      const group = pickFaceGroup();
      const flaw = pickFlaw(p);
      const tags = buildTags(p, [group.tag, '素颜', '显脸小', '修饰脸型']);
      const interact = pickInteract(p);
      return {
        title: `${group.name}本命${p}！！素颜直接拿捏✨`,
        steps: [
          { label: 'STEP 1 · 共情引入', text: `${group.painPoint}。试了好多款都不合适，直到遇到这款${p}，一戴上就决定是它了！` },
          { label: 'STEP 2 · emoji分区拆解', text: `✨ 版型颜值\n${group.frameStyle}设计，线条利落自带高级感，简约却不乏个性\n\n😎 上脸效果\n巨遮${group.feature}，戴上瞬间小脸既视感，素颜戴也超有气质\n\n🌞 佩戴体验\n板材镜框质感在线，${group.comfort}，久戴也不会累\n\n💫 场景适配\n日常通勤、出游拍照都百搭，不挑穿搭风格` },
          { label: 'STEP 3 · 真实感受', text: `${flaw}但整体来说瑕不掩瑜。同是${group.name}的姐妹可以直接抄作业，真的不踩雷！` },
          { label: 'STEP 4 · 互动引导', text: interact },
        ],
        tags: tags,
      };
    },
  },

  // ---- 模板2：门店试戴+明星同款（高互动高信任） ----
  {
    style: '门店试戴',
    hookType: '真实门店体验 + 明星同款',
    generate(p) {
      const tags = buildTags(p, ['明星同款', '门店试戴', '购物分享']);
      const interact = pickInteract(p);
      return {
        title: `门店试戴XX同款${p}✨被陌生人一句话种草了`,

};

// 长尾词前缀/后缀

// 产品分类模糊匹配
function matchTagDB(product) {
  // 精确匹配
  if (tagDB[product]) return tagDB[product];
  // 包含匹配
  for (const key of Object.keys(tagDB)) {
    if (product.includes(key) || key.includes(product)) return tagDB[key];
  }
  return null;
}

// 生成标签组合
function generateTags(product) {
  const matched = matchTagDB(product);

  if (matched) {
    // 使用品类库，按4维分层抽取
    const result = {
      traffic: shuffleAndPick(matched.traffic, 4),
      precise: shuffleAndPick(matched.precise, 5),
      scene: shuffleAndPick([...(matched.scene || []), ...(matched.style || [])], 5),
      longtail: shuffleAndPick([...(matched.face || []), ...(matched.brand || []), ...(matched.longtail || [])], 6),
    };
    lastTags = result;
    return result;
  }

  // 通用生成：基于产品名动态拼接
  lastTags = {
    traffic: shuffleAndPick([product, `${product}推荐`, ...universalTags.traffic], 4),
    precise: shuffleAndPick([`${product}新款`, `${product}测评`, ...universalTags.precise], 4),
    scene: shuffleAndPick(
      [...universalTags.scene, ...sceneSuffixes.map(s => `${product}${s}`)], 4
    ),
    longtail: shuffleAndPick(
      [
        ...longtailPrefixes.map(p => `${p}${product}`),
        ...longtailSuffixes.map(s => `${product}${s}`),
        ...universalTags.longtail,
      ], 6
    ),
  };
  return lastTags;
}

function shuffleAndPick(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  const seen = new Set();
  const result = [];
  for (const item of shuffled) {
    const key = item.toLowerCase();
    if (!seen.has(key)) {
      seen.add(key);
      result.push(item);
      if (result.length >= n) break;
    }
  }
  return result;
}

// ============================================================
// 核心逻辑

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  // 标签 tab 和全部 tab 也需要先有产品
  if (!lastProduct && (tab === 'tags' || tab === 'all')) {
    // 还没生成过，显示空状态
  }
  renderResults();
}

function generate() {
  const input = document.getElementById('productInput');
  const product = input.value.trim();

  if (!product) return;

  lastProduct = product;
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';

  setTimeout(() => {
    // 标题：从所有模板中随机挑5个
    const pickedTitles = shuffle(titleTemplates).slice(0, 5);
    lastTitles = pickedTitles.map(item => ({
      text: item.t(product),
      hook: item.hook,
    }));

    // 文案：从10个模板中随机挑3个
    const pickedCopy = shuffle(copywritingTemplates).slice(0, 3);
    lastCopywritings = pickedCopy.map(t => {
      const result = t.generate(product);
      return { ...result, style: t.style, hookType: t.hookType };
    });

    // 标签：基于产品名智能组合
    lastTags = generateTags(product);

    btn.disabled = false;
    btn.textContent = '换一批';
    document.getElementById('emptyTip').style.display = 'none';
    renderResults();
  }, 450);
}

function renderResults() {
  const titleList = document.getElementById('titleList');
  const copywritingList = document.getElementById('copywritingList');
  const emptyTip = document.getElementById('emptyTip');

  if (!lastProduct) {
    emptyTip.style.display = '';
    titleList.style.display = 'none';
    copywritingList.style.display = 'none';
    return;
  }

  // ---- 标题渲染 ----
  if (currentTab === 'title' || currentTab === 'all') {
    titleList.style.display = '';
    titleList.innerHTML = lastTitles.map(item => `
      <li class="result-item">
        <span style="font-size:11px;color:#ff6b6b;font-weight:700;margin-right:2px;white-space:nowrap;">[${item.hook}]</span>
        <span>${item.text}</span>
        <button class="copy-btn" onclick="copyText(this, '${escHtml(item.text)}')">复制</button>
      </li>
    `).join('');
  } else {
    titleList.style.display = 'none';
  }

  // ---- 文案渲染（4步公式可视化） ----
  if (currentTab === 'copywriting' || currentTab === 'all') {
    copywritingList.style.display = '';
    copywritingList.innerHTML = lastCopywritings.map(c => {
      const stepsHtml = c.steps.map(s => `
        <div class="card-step">
          <div class="step-label">${s.label}</div>
          <div class="step-text">${s.text}</div>
        </div>
      `).join('');

      const fullText = c.title + '\n\n' + c.steps.map(s => s.text).join('\n\n') + '\n\n' + c.tags.map(t => '#' + t).join(' ');

      return `
        <div class="copywriting-card">
          <div class="card-header">
            <span class="style-tag">${c.style}</span>
            <span class="hook-type">${c.hookType}</span>
            <button class="card-copy-btn" onclick="copyText(this, '${escJs(fullText)}')">复制全文</button>
          </div>
          <div style="font-size:17px;font-weight:700;color:#333;margin-bottom:14px;line-height:1.5;">${c.title}</div>
          ${stepsHtml}
          <div class="card-tags">
            ${c.tags.map(t => `<span class="hash-tag">#${t}</span>`).join('')}
          </div>
          <div class="interact-hint">💬 ${c.steps[c.steps.length - 1].text}</div>
        </div>
      `;
    }).join('');
  } else {
    copywritingList.style.display = 'none';
  }

  // ---- 标签组合渲染 ----
  const tagArea = document.getElementById('tagArea');
  if (currentTab === 'tags' || currentTab === 'all') {
    if (!lastTags) {
      tagArea.style.display = 'none';
    } else {
      tagArea.style.display = '';
      const sections = [
        { key: 'traffic', label: '大流量词', desc: '搜索量最大的核心词，覆盖最广人群', color: '#ff6b6b', icon: '🔥' },

        { key: 'scene', label: '场景词', desc: '绑定使用场景，匹配搜索意图', color: '#48dbfb', icon: '📍' },
        { key: 'longtail', label: '长尾词', desc: '搜索量小但转化率高，用于截流', color: '#ff9ff3', icon: '🔍' },
      ];

            <label class="tag-chip" data-tag-id="${tagId}" data-category="${s.key}" data-tag-text="${escHtml(t)}">

            </label>

        return `

              <span class="section-count">${lastTags[s.key] ? lastTags[s.key].length : 0}个</span>
            </div>
            <div style="font-size:12px;color:#aaa;margin-bottom:10px;">${s.desc}</div>
            <div class="tag-grid" data-category="${s.key}">${tags}</div>
          </div>
        `;
      }).join('');

      tagArea.innerHTML += `
        <div class="tag-actions">
          <button class="btn-copy-tags" id="btnCopySelected" onclick="copySelectedTags()">
            📋 复制选中标签
          </button>
          <button class="btn-secondary" onclick="selectAllTags()">全选</button>
          <button class="btn-secondary" onclick="deselectAllTags()">取消全选</button>
          <button class="btn-secondary" onclick="regenerateTags()">🔄 换一批</button>
        </div>
        <div class="copy-feedback" id="tagCopyFeedback"></div>
      `;

      // 绑定点击事件
      tagArea.querySelectorAll('.tag-chip').forEach(chip => {
        chip.addEventListener('click', function(e) {
          // 不阻止默认，让 label 行为正常
          this.classList.toggle('selected');
          updateCopyButton();
        });
      });
    }
  } else {
    tagArea.style.display = 'none';
  }
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function escJs(str) {
  return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    setTimeout(() => { btn.textContent = btn.classList.contains('card-copy-btn') ? '复制全文' : '复制'; }, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '已复制';
    setTimeout(() => { btn.textContent = btn.classList.contains('card-copy-btn') ? '复制全文' : '复制'; }, 1500);
  });
}

document.getElementById('productInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') generate();
});

// ============================================================
// 标签组合器交互
// ============================================================

function selectAllTags() {
  document.querySelectorAll('#tagArea .tag-chip').forEach(c => c.classList.add('selected'));
  updateCopyButton();
}

function deselectAllTags() {
  document.querySelectorAll('#tagArea .tag-chip').forEach(c => c.classList.remove('selected'));
  updateCopyButton();
}

function regenerateTags() {
  if (!lastProduct) return;
  lastTags = generateTags(lastProduct);
  renderResults();
}

function updateCopyButton() {
  const btn = document.getElementById('btnCopySelected');
  if (!btn) return;
  const count = document.querySelectorAll('#tagArea .tag-chip.selected').length;
  btn.textContent = count > 0 ? `📋 复制选中标签 (${count})` : '📋 复制选中标签';
}

function copySelectedTags() {
  const selected = document.querySelectorAll('#tagArea .tag-chip.selected');
  if (selected.length === 0) {
    showTagToast('请先选择标签');
    return;
  }
  const tags = [];
  selected.forEach(c => {
    tags.push('#' + c.dataset.tagText);
  });
  const text = tags.join(' ');
  copyToClipboard(text);
  showTagToast(`已复制 ${tags.length} 个标签`);
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

function showTagToast(msg) {
  const toast = document.getElementById('copyFeedback');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}
