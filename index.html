<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书内容生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 16px 10px 30px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 24px 18px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  }

  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    color: #999;
    font-size: 13px;
    margin-bottom: 20px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  input {
    flex: 1;
    min-width: 0;
    padding: 13px 14px;
    border: 2px solid #eee;
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  input:focus { border-color: #ff6b6b; }

  .btn-primary {
    padding: 13px 18px;
    background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,107,0.4); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    background: #f8f8f8;
    border-radius: 10px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    padding: 11px 0;
    text-align: center;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    color: #999;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab.active {
    background: #fff;
    color: #ff6b6b;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .result-area { min-height: 200px; }

  .result-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 14px 14px;
    background: #fdf2f8;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  .result-item:nth-child(1) { animation-delay: 0.05s; }
  .result-item:nth-child(2) { animation-delay: 0.15s; }
  .result-item:nth-child(3) { animation-delay: 0.25s; }
  .result-item:nth-child(4) { animation-delay: 0.35s; }
  .result-item:nth-child(5) { animation-delay: 0.45s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .copy-btn {
    margin-left: auto;
    padding: 8px 14px;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .copy-btn:active { background: #ff6b6b; color: #fff; border-color: #ff6b6b; }

  .empty-tip {
    text-align: center;
    color: #ccc;
    padding: 40px 0;
    font-size: 14px;
  }

  .copywriting-list { display: flex; flex-direction: column; gap: 16px; }

  .copywriting-card {
    background: #fdf2f8;
    border-radius: 14px;
    padding: 18px 16px;
    animation: fadeIn 0.35s ease forwards;
    opacity: 0;
  }

  .copywriting-card:nth-child(1) { animation-delay: 0.05s; }
  .copywriting-card:nth-child(2) { animation-delay: 0.15s; }
  .copywriting-card:nth-child(3) { animation-delay: 0.25s; }

  .copywriting-card .card-header {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
  }

  .copywriting-card .style-tag {
    padding: 4px 10px;
    background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    color: #fff; border-radius: 20px; font-size: 12px; font-weight: 600;
  }

  .copywriting-card .hook-type {
    padding: 4px 10px; background: #fff0e6; color: #e67e22;
    border-radius: 20px; font-size: 11px; font-weight: 600;
  }

  .copywriting-card .format-tag {
    padding: 4px 10px; background: #e8f4fd; color: #2980b9;
    border-radius: 20px; font-size: 11px; font-weight: 600;
  }

  .copywriting-card .card-copy-btn {
    margin-left: auto; padding: 8px 14px; background: #fff;
    border: 1px solid #eee; border-radius: 8px; font-size: 13px;
    color: #666; cursor: pointer; transition: all 0.15s;
    white-space: nowrap; min-height: 44px; display: flex; align-items: center;
  }

  .copywriting-card .card-copy-btn:active { background: #ff6b6b; color: #fff; border-color: #ff6b6b; }

  .copywriting-card .card-step { margin-bottom: 10px; }

  .copywriting-card .step-label {
    font-size: 11px; font-weight: 700; color: #ff6b6b; margin-bottom: 4px; letter-spacing: 1px;
  }

  .copywriting-card .step-text {
    font-size: 15px; color: #555; line-height: 1.85;
  }

  .copywriting-card .card-tags {
    margin-top: 14px; padding-top: 12px; border-top: 1px dashed #f0c4d8;
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  .copywriting-card .hash-tag {
    font-size: 12px; color: #ff6b6b; background: #fff;
    padding: 4px 10px; border-radius: 12px; line-height: 1.4;
  }

  .copywriting-card .interact-hint { margin-top: 10px; font-size: 13px; color: #999; font-style: italic; }

  .tag-area { animation: fadeIn 0.35s ease forwards; }
  .tag-section { margin-bottom: 18px; }

  .tag-section .section-title {
    font-size: 13px; font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }

  .tag-section .section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tag-section .section-count { font-weight: 400; color: #999; font-size: 12px; }

  .tag-section .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  .tag-chip {
    display: flex; align-items: center; gap: 6px; padding: 9px 14px;
    background: #fff; border: 2px solid #eee; border-radius: 22px;
    font-size: 14px; color: #333; cursor: pointer; transition: all 0.15s;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }

  .tag-chip:active { transform: scale(0.96); }
  .tag-chip.selected { background: #fdf2f8; border-color: #ff6b6b; color: #ff6b6b; font-weight: 600; }

  .tag-chip .chip-check {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ddd;
    display: flex; align-items: center; justify-content: center; font-size: 10px;
    flex-shrink: 0; transition: all 0.15s;
  }

  .tag-chip.selected .chip-check { background: #ff6b6b; border-color: #ff6b6b; color: #fff; }

  .tag-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

  .btn-secondary {
    padding: 12px 18px; background: #fff; border: 2px solid #eee;
    border-radius: 12px; font-size: 14px; font-weight: 600; color: #666;
    cursor: pointer; transition: all 0.15s; min-height: 44px;
    display: flex; align-items: center; gap: 6px;
  }

  .btn-secondary:active { background: #f8f8f8; border-color: #ccc; }

  .btn-copy-tags {
    padding: 12px 18px; background: linear-gradient(135deg, #ff6b6b, #ff9ff3);
    color: #fff; border: none; border-radius: 12px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
    min-height: 44px; display: flex; align-items: center; gap: 6px;
  }

  .btn-copy-tags:active { transform: scale(0.97); }
  .btn-copy-tags:disabled { opacity: 0.5; }

  .copy-feedback {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0,0,0,0.78); color: #fff;
    padding: 12px 28px; border-radius: 24px;
    font-size: 15px; font-weight: 600;
    pointer-events: none; opacity: 0;
    transition: all 0.25s; z-index: 99;
  }

  .copy-feedback.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  @media (max-width: 400px) {
    body { padding: 8px 4px 24px; }
    .card { border-radius: 12px; padding: 18px 12px; }
    h1 { font-size: 20px; }
    .input-row { flex-direction: column; gap: 8px; }
    input { width: 100%; padding: 14px; font-size: 16px; }
    .btn-primary { width: 100%; padding: 14px; font-size: 16px; text-align: center; }
    .tabs { border-radius: 8px; }
    .tab { font-size: 13px; padding: 10px 0; }
    .result-item { font-size: 14px; padding: 12px; gap: 6px; }
    .copywriting-card { padding: 14px 12px; }
    .copywriting-card .card-header { gap: 6px; }
    .copywriting-card .step-text { font-size: 14px; line-height: 1.8; }
    .tag-chip { font-size: 13px; padding: 8px 12px; }
    .tag-actions { flex-direction: column; }
    .tag-actions button { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="card">
  <h1>小红书内容生成器</h1>
  <p class="subtitle">基于爆款笔记拆解 · 输入产品一键生成标题和文案</p>

  </div>

  <div class="tabs">

    <button class="tab" data-tab="tags" onclick="switchTab('tags')">标签</button>
    <button class="tab" data-tab="all" onclick="switchTab('all')">全部</button>
  </div>

    <div class="empty-tip" id="emptyTip">输入产品名称后点击「生成内容」</div>
    <ul class="result-list" id="titleList" style="display:none"></ul>
    <div class="copywriting-list" id="copywritingList" style="display:none"></div>
    <div class="tag-area" id="tagArea" style="display:none"></div>
  </div>
</div>

<div class="copy-feedback" id="copyFeedback">已复制到剪贴板</div>

<script>

// 状态变量
// ============================================================

// ============================================================
// 通用工具函数
// ============================================================
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  const seen = new Set(); const result = [];
  const pool = [...arr].sort(() => Math.random() - 0.5);
  for (const item of pool) {
    if (!seen.has(item) && result.length < n) { seen.add(item); result.push(item); }
  }
  return result;
}
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function shuffleAndPick(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  const seen = new Set(); const result = [];
  for (const item of shuffled) { const key = item.toLowerCase(); if (!seen.has(key)) { seen.add(key); result.push(item); if (result.length >= n) break; } }
  return result;
}

// ============================================================
// 产品品类识别

function detectCategory(product) {
  const p = product.toLowerCase();
  const exact = {
    '墨镜':'eyewear','太阳镜':'eyewear','眼镜':'eyewear','sunglasses':'eyewear','墨镜夹片':'eyewear',
    '防晒霜':'skincare','防晒乳':'skincare','防晒喷雾':'skincare','防晒':'skincare','隔离霜':'skincare','防晒棒':'skincare',
    '防晒帽':'accessory','防晒口罩':'accessory','遮阳帽':'accessory','太阳帽':'accessory','防晒面罩':'accessory','冰袖':'accessory','防晒衣':'accessory','遮阳伞':'accessory',
    '口红':'cosmetics','唇釉':'cosmetics','唇膏':'cosmetics','唇泥':'cosmetics','唇彩':'cosmetics',
    '咖啡机':'appliance','咖啡壶':'appliance','磨豆机':'appliance',
    '耳机':'electronics','音箱':'electronics','音响':'electronics','蓝牙耳机':'electronics','降噪耳机':'electronics',
  };
  if (exact[p]) return exact[p];
  for (const [key, cat] of Object.entries(exact)) {
    if (p.includes(key) || key.includes(p)) return cat;
  }
  if (/镜/.test(p)) return 'eyewear';
  if (/防晒|霜|乳|喷雾|隔离/.test(p)) return 'skincare';
  if (/帽|口罩|面罩|遮阳|伞|袖|衣/.test(p)) return 'accessory';
  if (/口红|唇|妆|粉|彩|眼影|腮红/.test(p)) return 'cosmetics';
  if (/咖啡|萃取|豆|磨|泡/.test(p)) return 'appliance';
  if (/耳机|音|箱|响|降噪|蓝牙/.test(p)) return 'electronics';
  return 'generic';
}

function matchTagDB(product) {
  if (tagDB[product]) return tagDB[product];
  for (const key of Object.keys(tagDB)) {
    if (product.includes(key) || key.includes(product)) return tagDB[key];
  }
  return null;
}

function generateTags(product) {
  const matched = matchTagDB(product);
  if (matched) {
    const result = {
      traffic: shuffleAndPick(matched.traffic, 4),
      precise: shuffleAndPick(matched.precise, 5),
      scene: shuffleAndPick([...(matched.scene||[]),...(matched.style||[])], 5),
      longtail: shuffleAndPick([...(matched.face||[]),...(matched.brand||[]),...(matched.longtail||[])], 6),
    };
    lastTags = result;
    return result;
  }
  lastTags = {
    traffic: shuffleAndPick([product,`${product}推荐`,...universalTags.traffic], 4),
    precise: shuffleAndPick([`${product}新款`,`${product}测评`,...universalTags.precise], 4),
    scene: shuffleAndPick([...universalTags.scene,...sceneSuffixes.map(s=>`${product}${s}`)], 4),
    longtail: shuffleAndPick([...longtailPrefixes.map(p=>`${p}${product}`),...longtailSuffixes.map(s=>`${product}${s}`),...universalTags.longtail], 6),
  };
  return lastTags;
}

function buildTags(p, extra=[]) {
  const base = [p, `${p}推荐`, '好物分享'];
  const all = [...base, ...extra];
  return [...new Set(all)].slice(0, 12);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderResults();
}

function generate() {
  const input = document.getElementById('productInput');
  const product = input.value.trim();
  if (!product) return;

  if (product !== lastProduct) {
    usedTitleIndices = new Set();
    usedCopyIndices = new Set();
  }

  lastProduct = product;
  // 品类感知：检测品类并切换活跃内容池
  currentCat = detectCategory(product);
  ap = getActivePools(currentCat);

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';

  setTimeout(() => {
    // 标题：按品类过滤兼容模板，再随机抽5个
    let compatTitles = titleTemplates.filter(t => isTitleCompatible(t, currentCat));
    if (compatTitles.length < 5) compatTitles = titleTemplates; // fallback
    let titlePool = compatTitles.map((t,i)=>({t,i:titleTemplates.indexOf(t)})).filter(x=>!usedTitleIndices.has(x.i));
    let titleReset = false;
    if (titlePool.length < 5) {
      usedTitleIndices = new Set();
      titlePool = compatTitles.map((t,i)=>({t,i:titleTemplates.indexOf(t)}));
      titleReset = true;
    }
    const picked = shuffle(titlePool).slice(0, 5);
    lastTitles = picked.map(x=>{ usedTitleIndices.add(x.i); return { text: x.t.t(product), hook: x.t.hook }; });

    // 文案：按品类过滤兼容模板，再随机抽3个
    let compatCopy = copywritingTemplates.filter(t => isCopyCompatible(t, currentCat));
    if (compatCopy.length < 3) compatCopy = copywritingTemplates; // fallback
    let copyPool = compatCopy.map((t,i)=>({t,i:copywritingTemplates.indexOf(t)})).filter(x=>!usedCopyIndices.has(x.i));
    let copyReset = false;
    if (copyPool.length < 3) {
      usedCopyIndices = new Set();
      copyPool = compatCopy.map((t,i)=>({t,i:copywritingTemplates.indexOf(t)}));
      copyReset = true;
    }
    const pickedCopy = shuffle(copyPool).slice(0, 3);
    lastCopywritings = pickedCopy.map(x=>{
      usedCopyIndices.add(x.i);
      const result = x.t.generate(product);
      return { ...result, style: x.t.style, hookType: x.t.hookType, format: x.t.format };
    });

    lastTags = generateTags(product);

    btn.disabled = false;
    if (titleReset && copyReset) {
      btn.textContent = '已轮完全部 · 重新开始';
      showTagToast('所有模板已轮完一遍，已自动重新洗牌 🔄');
    } else if (titleReset) {
      btn.textContent = '标题池已刷新 · 换一批';
    } else if (copyReset) {
      btn.textContent = '文案池已刷新 · 换一批';
    } else {
      btn.textContent = '换一批';
    }
    document.getElementById('emptyTip').style.display = 'none';
    renderResults();
  }, 350);
}

function renderResults() {
  const titleList = document.getElementById('titleList');
  const copywritingList = document.getElementById('copywritingList');
  const emptyTip = document.getElementById('emptyTip');

  if (!lastProduct) {
    emptyTip.style.display = '';
    titleList.style.display = 'none';
    copywritingList.style.display = 'none';
    return;
  }

  if (currentTab === 'title' || currentTab === 'all') {
    titleList.style.display = '';
    titleList.innerHTML = lastTitles.map(item => `
      <li class="result-item">
        <span style="font-size:11px;color:#ff6b6b;font-weight:700;margin-right:2px;white-space:nowrap;">[${item.hook}]</span>
        <span>${item.text}</span>
        <button class="copy-btn" onclick="copyText(this,'${escHtml(item.text)}')">复制</button>
      </li>
    `).join('');
  } else {
    titleList.style.display = 'none';
  }

  if (currentTab === 'copywriting' || currentTab === 'all') {
    copywritingList.style.display = '';
    copywritingList.innerHTML = lastCopywritings.map(c => {
      const stepsHtml = c.steps.map(s => `
        <div class="card-step">
          <div class="step-label">${s.label}</div>
          <div class="step-text">${s.text}</div>
        </div>
      `).join('');
      const fullText = c.title + '\n\n' + c.steps.map(s => s.text).join('\n\n') + '\n\n' + c.tags.map(t => '#' + t).join(' ');
      const formatLabel = {A:'4分区',B:'短平快',C:'故事',D:'合集',E:'情绪'}[c.format] || c.format;
      return `
        <div class="copywriting-card">
          <div class="card-header">
            <span class="style-tag">${c.style}</span>
            <span class="hook-type">${c.hookType}</span>
            <span class="format-tag">${formatLabel}</span>
            <button class="card-copy-btn" onclick="copyText(this,'${escJs(fullText)}')">复制全文</button>
          </div>
          <div style="font-size:17px;font-weight:700;color:#333;margin-bottom:14px;line-height:1.5;">${c.title}</div>
          ${stepsHtml}
          <div class="card-tags">${c.tags.map(t=>`<span class="hash-tag">#${t}</span>`).join('')}</div>
        </div>
      `;
    }).join('');
  } else {
    copywritingList.style.display = 'none';
  }

  const tagArea = document.getElementById('tagArea');
  if (currentTab === 'tags' || currentTab === 'all') {
    if (!lastTags) {
      tagArea.style.display = 'none';
    } else {
      tagArea.style.display = '';
      const sections = [
        { key:'traffic',label:'大流量词',desc:'搜索量最大的核心词，覆盖最广人群',color:'#ff6b6b',icon:'🔥'},
        { key:'precise',label:'精准词',desc:'精准描述产品属性，触达目标用户',color:'#feca57',icon:'🎯'},
        { key:'scene',label:'场景/风格词',desc:'绑定使用场景和风格偏好',color:'#48dbfb',icon:'📍'},
        { key:'longtail',label:'长尾词',desc:'搜索量小但转化率高，精确截流',color:'#ff9ff3',icon:'🔍'},
      ];
      tagArea.innerHTML = sections.map(s => {
        const tags = (lastTags[s.key]||[]).map(t => {
          const tagId = `tag_${s.key}_${t.replace(/[^a-zA-Z0-9一-龥]/g,'_')}`;
          return `<label class="tag-chip" data-tag-id="${tagId}" data-category="${s.key}" data-tag-text="${escHtml(t)}"><span class="chip-check"></span><span>${t}</span></label>`;
        }).join('');
        return `<div class="tag-section"><div class="section-title"><span class="section-dot" style="background:${s.color}"></span><span>${s.icon} ${s.label}</span><span class="section-count">${lastTags[s.key]?lastTags[s.key].length:0}个</span></div><div style="font-size:12px;color:#aaa;margin-bottom:10px;">${s.desc}</div><div class="tag-grid" data-category="${s.key}">${tags}</div></div>`;
      }).join('');
      tagArea.innerHTML += `
        <div class="tag-actions">
          <button class="btn-copy-tags" id="btnCopySelected" onclick="copySelectedTags()">📋 复制选中标签</button>
          <button class="btn-secondary" onclick="selectAllTags()">全选</button>
          <button class="btn-secondary" onclick="deselectAllTags()">取消全选</button>
          <button class="btn-secondary" onclick="regenerateTags()">🔄 换一批</button>
        </div>
        <div class="copy-feedback" id="tagCopyFeedback"></div>
      `;
      tagArea.querySelectorAll('.tag-chip').forEach(chip => {
        chip.addEventListener('click',function(){ this.classList.toggle('selected'); updateCopyButton(); });
      });
    }
  } else {
    tagArea.style.display = 'none';
  }
}

function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escJs(str) { return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent = '已复制';
    setTimeout(()=>{ btn.textContent = btn.classList.contains('card-copy-btn')?'复制全文':'复制'; },1500);
  }).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '已复制';
    setTimeout(()=>{ btn.textContent = btn.classList.contains('card-copy-btn')?'复制全文':'复制'; },1500);
  });
}

document.getElementById('productInput').addEventListener('keydown',(e)=>{ if(e.key==='Enter') generate(); });

// ============================================================
// 标签组合器交互
// ============================================================
function selectAllTags() { document.querySelectorAll('#tagArea .tag-chip').forEach(c=>c.classList.add('selected')); updateCopyButton(); }
function deselectAllTags() { document.querySelectorAll('#tagArea .tag-chip').forEach(c=>c.classList.remove('selected')); updateCopyButton(); }
function regenerateTags() { if(!lastProduct) return; lastTags = generateTags(lastProduct); renderResults(); }
function updateCopyButton() {
  const btn = document.getElementById('btnCopySelected');
  if(!btn) return;
  const count = document.querySelectorAll('#tagArea .tag-chip.selected').length;
  btn.textContent = count>0?`📋 复制选中标签 (${count})`:'📋 复制选中标签';
}
function copySelectedTags() {
  const selected = document.querySelectorAll('#tagArea .tag-chip.selected');
  if(selected.length===0){ showTagToast('请先选择标签'); return; }
  const tags = []; selected.forEach(c=>{ tags.push('#'+c.dataset.tagText); });
  copyToClipboard(tags.join(' ')); showTagToast(`已复制 ${tags.length} 个标签`);
}
function copyToClipboard(text) {
  if(navigator.clipboard){ navigator.clipboard.writeText(text); }
  else { const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
}
function showTagToast(msg) {
  const toast = document.getElementById('copyFeedback');
  toast.textContent = msg; toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1800);
}
</script>
